name: Build Android 14 GKI (6.1)

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build-gki.sh'
      - '.github/workflows/common-android.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # This deletes everything we don't need for a kernel build
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Build Script
        run: bash scripts/build-gki.sh

      - name: Upload Image and Log
        uses: actions/upload-artifact@v4
        with:
          name: gki-aarch64-image
          path: |
            workspace/out/dist/Image
            workspace/build.log
          if-no-files-found: error
